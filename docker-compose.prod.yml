# ─────────────────────────────────────────────────────────────────────────────
# Amdox ERP — Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:

  db:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  backend:
    restart: always
    environment:
      NODE_ENV: production
      ENABLE_SWAGGER: "false"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
      update_config:
        parallelism: 1
        delay: 10s
        order: rolling

  frontend:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
      update_config:
        parallelism: 1
        delay: 5s

  nginx:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  ai-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  prometheus:
    restart: always

  grafana:
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://monitoring.amdox.io}

  loki:
    restart: always

  alertmanager:
    restart: always
