version: 1
services:
  # 1. Backend Web Service
  - type: web
    name: amdox-erp-backend
    runtime: node
    plan: starter
    buildCommand: npm run prisma:db:postgres --workspace=backend && npm install && npx prisma generate --schema=backend/prisma/schema.prisma && npm run build --workspace=backend
    startCommand: npm run start --workspace=backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: amdox-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENABLE_SWAGGER
        value: "false"

  # 2. Frontend Static Site
  - type: web
    name: amdox-erp-frontend
    runtime: static
    buildCommand: npm install && npm run build --workspace=frontend
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://amdox-erp-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # 3. Managed PostgreSQL Database
  - name: amdox-erp-db
    plan: starter
