apiVersion: v1
kind: ConfigMap
metadata:
  name: amdox-config
  namespace: amdox-erp
  labels:
    app.kubernetes.io/name: amdox-erp
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  ENABLE_SWAGGER: "false"
  CORS_ORIGINS: "https://app.amdox.io"
  AI_SERVICE_URL: "http://ai-service:8000"
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis:6379"
