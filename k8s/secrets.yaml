# ─── IMPORTANT ────────────────────────────────────────────────────────────────
# Never commit real secrets to version control!
# Generate secrets with: kubectl create secret generic amdox-secrets \
#   --from-literal=DATABASE_URL='postgresql://...' \
#   --from-literal=JWT_SECRET='...' \
#   --from-literal=JWT_REFRESH_SECRET='...' \
#   --from-literal=REDIS_PASSWORD='...' \
#   --namespace=amdox-erp
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: amdox-secrets
  namespace: amdox-erp
  labels:
    app.kubernetes.io/name: amdox-erp
type: Opaque
stringData:
  DATABASE_URL: "postgresql://CHANGE_ME:CHANGE_ME@postgres:5432/amdox_erp?schema=public"
  JWT_SECRET: "CHANGE_ME_STRONG_JWT_SECRET_MIN_64_CHARS"
  JWT_REFRESH_SECRET: "CHANGE_ME_STRONG_REFRESH_SECRET_MIN_64_CHARS"
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"
  GRAFANA_PASSWORD: "CHANGE_ME_GRAFANA_ADMIN_PASSWORD"
