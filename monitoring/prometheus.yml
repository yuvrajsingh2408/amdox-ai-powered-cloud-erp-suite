global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'amdox-erp'
    environment: 'production'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ── Prometheus itself ──────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── Amdox ERP Backend ─────────────────────────────────────────────────────
  - job_name: amdox-backend
    static_configs:
      - targets: ['backend:5000']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'amdox-backend'

  # ── PostgreSQL (via postgres-exporter) ────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'amdox-postgres'

  # ── Redis (via redis-exporter) ────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'amdox-redis'

  # ── Nginx (via nginx-exporter) ────────────────────────────────────────────
  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'amdox-nginx'

  # ── Node Exporter (host metrics) ──────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
